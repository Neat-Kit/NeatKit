<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0c0c0c; --bg2: #141414; --bg3: #1c1c1c; --border: #2a2a2a; --border2: #3a3a3a; --text: #e8e6e0; --text2: #8a8880; --text3: #5a5856; --accent: #c8f04a; --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif; }

  .container { max-width: 900px; margin: 0 auto; padding: 2.5rem 2rem; }

  .mode-tabs { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 1.5rem; width: fit-content; }
  .mode-tab { background: var(--bg2); border: none; color: var(--text2); font-family: var(--mono); font-size: 0.8rem; padding: 0.5rem 1.25rem; cursor: pointer; transition: all 0.12s; border-right: 1px solid var(--border); }
  .mode-tab:last-child { border-right: none; }
  .mode-tab.active { background: var(--accent); color: #0c0c0c; font-weight: 700; }
  .panel { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .field-label { font-family: var(--mono); font-size: 0.7rem; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }
  textarea { width: 100%; min-height: 280px; background: var(--bg2); border: 1px solid var(--border2); color: var(--text); font-family: var(--mono); font-size: 0.85rem; line-height: 1.6; padding: 1rem; border-radius: 8px; resize: vertical; outline: none; transition: border-color 0.15s; word-break: break-all; }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text3); }
  .err { color: #ff6b6b; font-family: var(--mono); font-size: 0.8rem; margin-top: 0.5rem; }
  .copy-btn { background: transparent; border: 1px solid var(--border2); color: var(--text2); font-family: var(--mono); font-size: 0.65rem; padding: 0.2rem 0.5rem; border-radius: 4px; cursor: pointer; transition: all 0.12s; }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .file-zone { border: 1px dashed var(--border2); border-radius: 8px; padding: 1.5rem; text-align: center; cursor: pointer; color: var(--text3); font-size: 0.85rem; margin-bottom: 1rem; transition: border-color 0.15s; position: relative; }
  .file-zone:hover { border-color: var(--accent); color: var(--accent); }
  .file-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  @media (max-width: 600px) { .panel { grid-template-columns: 1fr; } }
</style>

<body>
<nav class="nk-nav">
  <div class="nk-nav-inner">
    <a class="nk-logo" href="../index.html"><div class="nk-logo-mark"></div><span class="nk-logo-text">Neat<em>kit</em></span></a>
    <div class="nk-breadcrumb"><span>/</span><a href="../index.html">tools</a><span>/</span><span>base64</span></div>
    <a class="nk-back" href="../index.html">← All tools</a>
  </div>
</nav>
<div class="container">
  <h1>Base64 Encoder / Decoder</h1>
  <p class="subtitle">Encode text or files to Base64, or decode Base64 back to text. Everything runs in your browser.</p>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('text')">Text</button>
    <button class="mode-tab" onclick="setMode('url')">URL-safe</button>
    <button class="mode-tab" onclick="setMode('file')">File → Base64</button>
  </div>
  <div id="text-mode">
    <div class="panel">
      <div>
        <div class="field-label"><span>Plain text</span><button class="copy-btn" onclick="copyField('input')">Copy</button></div>
        <textarea id="input" placeholder="Type or paste text here..." oninput="encode()"></textarea>
      </div>
      <div>
        <div class="field-label"><span>Base64 encoded</span><button class="copy-btn" onclick="copyField('output')">Copy</button></div>
        <textarea id="output" placeholder="Base64 output will appear here..." oninput="decode()"></textarea>
        <div class="err" id="err"></div>
      </div>
    </div>
  </div>
  <div id="file-mode" style="display:none">
    <div class="file-zone">
      <input type="file" id="file-input" onchange="fileToBase64()">
      📎 Drop a file here or click to browse
    </div>
    <div class="field-label"><span>Base64 output</span><button class="copy-btn" onclick="copyField('file-output')">Copy</button></div>
    <textarea id="file-output" placeholder="Base64 encoded file will appear here..." readonly style="min-height:320px;"></textarea>
    <div id="file-info" style="font-size:0.8rem;color:var(--text3);font-family:var(--mono);margin-top:0.5rem"></div>
  </div>
</div>
<script>
  let mode = 'text';
  let encodeTimeout = null;

  function setMode(m) {
    mode = m;
    document.querySelectorAll('.mode-tab').forEach((t,i) => t.classList.toggle('active', ['text','url','file'][i] === m));
    document.getElementById('text-mode').style.display = m !== 'file' ? '' : 'none';
    document.getElementById('file-mode').style.display = m === 'file' ? '' : 'none';
  }

  function encode() {
    clearTimeout(encodeTimeout);
    encodeTimeout = setTimeout(() => {
      const text = document.getElementById('input').value;
      if (!text) { document.getElementById('output').value = ''; document.getElementById('err').textContent = ''; return; }
      try {
        let encoded = btoa(unescape(encodeURIComponent(text)));
        if (mode === 'url') encoded = encoded.replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        document.getElementById('output').value = encoded;
        document.getElementById('err').textContent = '';
      } catch(e) { document.getElementById('err').textContent = 'Error: ' + e.message; }
    }, 50);
  }

  function decode() {
    const b64 = document.getElementById('output').value;
    if (!b64) { document.getElementById('input').value = ''; document.getElementById('err').textContent = ''; return; }
    try {
      let normalized = b64.replace(/-/g, '+').replace(/_/g, '/');
      while (normalized.length % 4) normalized += '=';
      const decoded = decodeURIComponent(escape(atob(normalized)));
      document.getElementById('input').value = decoded;
      document.getElementById('err').textContent = '';
    } catch(e) {
      document.getElementById('err').textContent = 'Invalid Base64 — ' + e.message;
    }
  }

  function fileToBase64() {
    const file = document.getElementById('file-input').files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('file-output').value = e.target.result;
      document.getElementById('file-info').textContent = `${file.name} · ${(file.size/1024).toFixed(1)} KB · ${file.type || 'unknown type'}`;
    };
    reader.readAsDataURL(file);
  }

  function copyField(id) {
    const val = document.getElementById(id).value;
    navigator.clipboard.writeText(val).then(() => {
      const btns = document.querySelectorAll('.copy-btn');
      btns.forEach(b => { if(b.onclick?.toString().includes(id)) { b.textContent = 'Copied!'; setTimeout(() => b.textContent = 'Copy', 1500); } });
    });
  }
</script>
