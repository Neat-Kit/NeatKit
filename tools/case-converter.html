<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Converter — Zana Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0c0c0c; --bg2: #141414; --bg3: #1c1c1c; --border: #2a2a2a; --border2: #3a3a3a; --text: #e8e6e0; --text2: #8a8880; --text3: #5a5856; --accent: #c8f04a; --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 16px; min-height: 100vh; }
  nav { position: sticky; top: 0; z-index: 100; background: rgba(12,12,12,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; gap: 1rem; height: 56px; }
  .logo { font-family: var(--mono); font-size: 1.1rem; font-weight: 700; color: var(--accent); text-decoration: none; }
  .logo span { color: var(--text2); font-weight: 400; }
  .breadcrumb { color: var(--text3); font-size: 0.8rem; font-family: var(--mono); }
  .breadcrumb a { color: var(--text3); text-decoration: none; }
  .breadcrumb a:hover { color: var(--accent); }
  .container { max-width: 900px; margin: 0 auto; padding: 2.5rem 2rem; }
  h1 { font-family: var(--mono); font-size: 1.75rem; font-weight: 700; margin-bottom: 0.4rem; letter-spacing: -0.02em; }
  .subtitle { color: var(--text2); font-size: 0.9rem; margin-bottom: 2rem; }
  textarea { width: 100%; min-height: 200px; background: var(--bg2); border: 1px solid var(--border2); color: var(--text); font-family: var(--sans); font-size: 0.95rem; line-height: 1.7; padding: 1.25rem; border-radius: 8px; resize: vertical; outline: none; transition: border-color 0.15s; }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text3); }
  .btn-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.6rem; margin: 1.25rem 0; }
  .case-btn { background: var(--bg2); border: 1px solid var(--border); color: var(--text2); font-family: var(--mono); font-size: 0.75rem; padding: 0.625rem 1rem; border-radius: 8px; cursor: pointer; transition: all 0.12s; text-align: left; letter-spacing: 0.03em; }
  .case-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(200,240,74,0.05); }
  .case-btn .preview { color: var(--text3); font-size: 0.65rem; margin-top: 0.2rem; display: block; }
  .result-box { margin-top: 1.25rem; }
  .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
  .result-label { font-family: var(--mono); font-size: 0.7rem; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; }
  .copy-btn { background: transparent; border: 1px solid var(--border2); color: var(--text2); font-family: var(--mono); font-size: 0.72rem; padding: 0.3rem 0.75rem; border-radius: 6px; cursor: pointer; transition: all 0.12s; }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<nav>
  <a class="logo" href="../index.html">Neatkit</a>
  <span class="breadcrumb">/ <a href="../index.html">tools</a> / case-converter</span>
</nav>
<div class="container">
  <h1>Case Converter</h1>
  <p class="subtitle">Convert text between cases instantly. Click any format to apply.</p>
  <textarea id="input" placeholder="Type or paste your text here..."></textarea>
  <div class="btn-grid">
    <button class="case-btn" onclick="apply('upper')">UPPERCASE<span class="preview">HELLO WORLD</span></button>
    <button class="case-btn" onclick="apply('lower')">lowercase<span class="preview">hello world</span></button>
    <button class="case-btn" onclick="apply('title')">Title Case<span class="preview">Hello World</span></button>
    <button class="case-btn" onclick="apply('sentence')">Sentence case<span class="preview">Hello world</span></button>
    <button class="case-btn" onclick="apply('camel')">camelCase<span class="preview">helloWorld</span></button>
    <button class="case-btn" onclick="apply('pascal')">PascalCase<span class="preview">HelloWorld</span></button>
    <button class="case-btn" onclick="apply('snake')">snake_case<span class="preview">hello_world</span></button>
    <button class="case-btn" onclick="apply('kebab')">kebab-case<span class="preview">hello-world</span></button>
    <button class="case-btn" onclick="apply('constant')">CONSTANT_CASE<span class="preview">HELLO_WORLD</span></button>
    <button class="case-btn" onclick="apply('dot')">dot.case<span class="preview">hello.world</span></button>
    <button class="case-btn" onclick="apply('toggle')">tOGGLE cASE<span class="preview">hELLO wORLD</span></button>
    <button class="case-btn" onclick="apply('alternate')">aLtErNaTe<span class="preview">hElLo WoRlD</span></button>
  </div>
  <div class="result-box" id="result-box" style="display:none">
    <div class="result-header">
      <span class="result-label" id="result-label">Result</span>
      <button class="copy-btn" onclick="copyResult()">Copy</button>
    </div>
    <textarea id="output" readonly></textarea>
  </div>
</div>
<script>
  function words(text) {
    return text.trim().split(/[\s_\-\.]+/).filter(Boolean);
  }
  function apply(type) {
    const text = document.getElementById('input').value;
    if (!text.trim()) return;
    let result = '';
    const labels = {upper:'UPPERCASE',lower:'lowercase',title:'Title Case',sentence:'Sentence case',camel:'camelCase',pascal:'PascalCase',snake:'snake_case',kebab:'kebab-case',constant:'CONSTANT_CASE',dot:'dot.case',toggle:'Toggle case',alternate:'Alternate case'};
    switch(type) {
      case 'upper': result = text.toUpperCase(); break;
      case 'lower': result = text.toLowerCase(); break;
      case 'title': result = text.replace(/\w\S*/g, w => w[0].toUpperCase() + w.slice(1).toLowerCase()); break;
      case 'sentence': result = text.toLowerCase().replace(/(^\s*\w|[.!?]\s*\w)/g, c => c.toUpperCase()); break;
      case 'camel': { const w = words(text); result = w[0].toLowerCase() + w.slice(1).map(x => x[0].toUpperCase() + x.slice(1).toLowerCase()).join(''); break; }
      case 'pascal': result = words(text).map(w => w[0].toUpperCase() + w.slice(1).toLowerCase()).join(''); break;
      case 'snake': result = words(text).map(w => w.toLowerCase()).join('_'); break;
      case 'kebab': result = words(text).map(w => w.toLowerCase()).join('-'); break;
      case 'constant': result = words(text).map(w => w.toUpperCase()).join('_'); break;
      case 'dot': result = words(text).map(w => w.toLowerCase()).join('.'); break;
      case 'toggle': result = text.split('').map(c => c === c.toUpperCase() ? c.toLowerCase() : c.toUpperCase()).join(''); break;
      case 'alternate': result = text.split('').map((c,i) => i%2===0 ? c.toLowerCase() : c.toUpperCase()).join(''); break;
    }
    document.getElementById('output').value = result;
    document.getElementById('result-label').textContent = labels[type];
    document.getElementById('result-box').style.display = 'block';
  }
  function copyResult() {
    const out = document.getElementById('output').value;
    navigator.clipboard.writeText(out).then(() => {
      const btn = event.target;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    });
  }
</script>
</body>
</html>
